name: Validate installer assets

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-installer-assets:
    name: Validate installer assets
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate installer assets
        shell: bash
        run: |
          test -s bootstrap.sh
          test -s scripts/install.sh
          bash -n bootstrap.sh
          bash -n scripts/install.sh
