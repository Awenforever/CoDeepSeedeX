name: Release installer assets

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-installer-assets:
    name: Upload installer assets
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate installer assets
        shell: bash
        run: |
          test -s bootstrap.sh
          test -s scripts/install.sh
          bash -n bootstrap.sh
          bash -n scripts/install.sh

      - name: Stage installer assets
        shell: bash
        run: |
          mkdir -p /tmp/codeepseedex-release-assets
          cp bootstrap.sh /tmp/codeepseedex-release-assets/bootstrap.sh
          cp scripts/install.sh /tmp/codeepseedex-release-assets/install.sh
          chmod 0644 /tmp/codeepseedex-release-assets/bootstrap.sh
          chmod 0644 /tmp/codeepseedex-release-assets/install.sh

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" /tmp/codeepseedex-release-assets/bootstrap.sh /tmp/codeepseedex-release-assets/install.sh --clobber
            gh release edit "$tag" --latest
          else
            gh release create "$tag" /tmp/codeepseedex-release-assets/bootstrap.sh /tmp/codeepseedex-release-assets/install.sh --title "$tag" --generate-notes --latest --verify-tag
          fi
